spring.application.name=media-utility
spring.datasource.url=${MEDIA_UTILITY_DATASOURCE_URL:jdbc:mysql://localhost:3306/media-utility}
spring.datasource.username=${MEDIA_UTILITY_DATASOURCE_USERNAME:root}
spring.datasource.password=${MEDIA_UTILITY_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${MEDIA_UTILITY_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
media-utility.storage.root=${MEDIA_UTILITY_STORAGE_ROOT:./storage}
media-utility.process.default-timeout=5m
media-utility.process.output-capture-limit-bytes=65536
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
media-utility.upload.max-size-bytes=104857600
media-utility.ffmpeg.path=ffmpeg
media-utility.storage.retention=1h
media-utility.ytdlp.path=yt-dlp
